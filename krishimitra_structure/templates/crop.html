<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crop Recommendation Engine — KrishiMitra</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
         :root {
            --primary-dark: #1a4d2e;
            --primary-mid: #2d7a45;
            --primary-light: #4a9e5c;
            --accent-gold: #c8a951;
            --bg-cream: #f5f0e8;
            --white: #ffffff;
            --text-primary: #1a1a1a;
            --text-secondary: #555555;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }
        
        body {
            background-color: var(--bg-cream);
            color: var(--text-primary);
            padding: 20px;
        }
        
        .container {
            max-width: 1100px;
            margin: 0 auto;
        }
        /* Glassmorphic Main Card Content Area */
        
        .input-card {
            background: var(--white);
            padding: 35px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
            border-left: 6px solid var(--primary-mid);
            margin-bottom: 30px;
        }
        
        .card-header-title {
            color: var(--primary-dark);
            margin-bottom: 25px;
            font-size: 1.4rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 2px solid var(--bg-cream);
            padding-bottom: 10px;
        }
        /* Responsive Input Form Layout Grid Setup */
        
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
        }
        
        .form-group label {
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 8px;
        }
        
        .form-control {
            padding: 10px 12px;
            border: 1.5px solid #ccc;
            border-radius: 8px;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
            background-color: #fafafa;
        }
        
        .form-control:focus {
            border-color: var(--primary-mid);
            background-color: var(--white);
        }
        /* Custom style configurations for Slider UI components */
        
        .slider-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .slider-container input {
            flex-grow: 1;
        }
        
        .slider-val {
            font-weight: 600;
            color: var(--primary-dark);
            min-width: 30px;
        }
        
        .submit-btn {
            background-color: var(--primary-mid);
            color: var(--white);
            padding: 14px 30px;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 4px 12px rgba(45, 122, 69, 0.2);
        }
        
        .submit-btn:hover {
            background-color: var(--primary-dark);
        }
        /* Loading Widget Block */
        
        .loading-wrapper {
            display: none;
            text-align: center;
            padding: 30px;
        }
        
        .progress-track {
            width: 100%;
            max-width: 400px;
            height: 8px;
            background-color: #e0e0e0;
            border-radius: 4px;
            margin: 15px auto;
            overflow: hidden;
        }
        
        .progress-bar-fill {
            height: 100%;
            width: 0%;
            background-color: var(--primary-light);
            border-radius: 4px;
            transition: width 0.1s linear;
        }
        /* Output Inference Layout Grid System */
        
        .results-container {
            display: none;
        }
        
        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }
        
        .crop-card {
            background: var(--white);
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            border-top: 4px solid transparent;
            transition: transform 0.2s;
        }
        
        .crop-card:nth-child(1) {
            border-top-color: #2b7a43;
        }
        
        .crop-card:nth-child(2) {
            border-top-color: #4a9e5c;
        }
        
        .crop-card:nth-child(3) {
            border-top-color: #c8a951;
        }
        
        .crop-card:nth-child(4) {
            border-top-color: #8c8c8c;
        }
        
        .crop-card:nth-child(5) {
            border-top-color: #b3b3b3;
        }
        
        .crop-card:hover {
            transform: translateY(-3px);
        }
        
        .crop-title-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .crop-name {
            font-size: 1.2rem;
            color: var(--primary-dark);
            font-weight: 600;
        }
        
        .season-badge {
            font-size: 0.75rem;
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: 600;
            text-transform: uppercase;
        }
        
        .badge-kharif {
            background-color: #e3f2fd;
            color: #1e88e5;
        }
        
        .badge-rabi {
            background-color: #fff3e0;
            color: #fb8c00;
        }
        
        .badge-zaid {
            background-color: #fffde7;
            color: #fdd835;
        }
        
        .confidence-label {
            font-size: 0.85rem;
            color: var(--text-secondary);
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
        }
        
        .confidence-bar {
            width: 100%;
            height: 6px;
            background-color: #eee;
            border-radius: 3px;
            margin-bottom: 15px;
        }
        
        .confidence-fill {
            height: 100%;
            background-color: var(--primary-mid);
            border-radius: 3px;
        }
        
        .crop-tips {
            font-size: 0.85rem;
            color: var(--text-secondary);
            line-height: 1.5;
            border-top: 1px dashed #eee;
            padding-top: 12px;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="input-card">
            <h3 class="card-header-title"><i class="fa-solid fa-sliders"></i> Environmental & Soil Input Parameters</h3>

            <form id="cropPredictionForm">
                <div class="form-grid">
                    <div class="form-group">
                        <label>State Region</label>
                        <select name="state" id="stateSelect" class="form-control" required>
                            <option value="Gujarat">Gujarat</option>
                            <option value="Maharashtra">Maharashtra</option>
                            <option value="Rajasthan">Rajasthan</option>
                            <option value="Punjab">Punjab</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>District Belt</label>
                        <select name="district" id="districtSelect" class="form-control" required>
                            <option value="Ahmedabad">Ahmedabad</option>
                            <option value="Surat">Surat</option>
                            <option value="Rajkot">Rajkot</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Agricultural Season</label>
                        <select name="season" id="seasonSelect" class="form-control" required>
                            <option value="Kharif">Kharif (Jun–Oct)</option>
                            <option value="Rabi">Rabi (Nov–Mar)</option>
                            <option value="Zaid">Zaid (Apr–Jun)</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Soil Composition Type</label>
                        <select name="soil_type" class="form-control" required>
                            <option value="Black">Black Soil</option>
                            <option value="Alluvial">Alluvial Soil</option>
                            <option value="Red">Red Soil</option>
                            <option value="Laterite">Laterite Soil</option>
                        </select>
                    </div>
                </div>

                <div class="form-grid">
                    <div class="form-group">
                        <label>Nitrogen Content (N) <small>kg/ha</small></label>
                        <input type="number" name="n" class="form-control" min="0" max="150" value="65" required>
                    </div>
                    <div class="form-group">
                        <label>Phosphorus Content (P) <small>kg/ha</small></label>
                        <input type="number" name="p" class="form-control" min="0" max="150" value="45" required>
                    </div>
                    <div class="form-group">
                        <label>Potassium Content (K) <small>kg/ha</small></label>
                        <input type="number" name="k" class="form-control" min="0" max="210" value="35" required>
                    </div>
                    <div class="form-group">
                        <label>Soil pH Balance Metric</label>
                        <div class="slider-container">
                            <input type="range" name="ph" id="phSlider" min="3.5" max="9.0" step="0.1" value="6.5">
                            <span class="slider-val" id="phValue">6.5</span>
                        </div>
                    </div>
                </div>

                <div class="form-grid">
                    <div class="form-group">
                        <label>Ambient Temperature (°C)</label>
                        <input type="number" name="temperature" id="temperatureInput" step="0.1" class="form-control" value="28.5" required>
                    </div>
                    <div class="form-group">
                        <label>Relative Humidity (%)</label>
                        <input type="number" name="humidity" id="humidityInput" step="0.1" class="form-control" value="62.0" required>
                    </div>
                    <div class="form-group">
                        <label>Annual Rainfall Index <small>mm</small></label>
                        <input type="number" name="rainfall" class="form-control" value="850" required>
                    </div>
                </div>

                <button type="submit" class="submit-btn">
                    <i class="fa-solid fa-brain"></i> Compute Optimal Recommendations
                </button>
            </form>
        </div>

        <div class="loading-wrapper" id="loadingWrapper">
            <i class="fa-solid fa-spinner fa-spin fa-2x" style="color: var(--primary-mid);"></i>
            <p style="margin-top:10px; font-weight:500;">Running Ensemble Pipeline Assessment Model Inference...</p>
            <div class="progress-track">
                <div class="progress-bar-fill" id="progressBarFill"></div>
            </div>
        </div>

        <div class="results-container" id="resultsContainer">
            <h2 class="card-header-title" style="border:none; margin-bottom:20px;">
                <i class="fa-solid fa-square-poll-vertical"></i> Top Crop Optimization Predictions
            </h2>
            <div class="results-grid" id="resultsGrid">
            </div>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            // Slider synchronization linkage
            const phSlider = document.getElementById("phSlider");
            const phValue = document.getElementById("phValue");
            if (phSlider) {
                phSlider.addEventListener("input", (e) => phValue.innerText = e.target.value);
            }

            // Season Auto-Detection
            const currentMonth = new Date().getMonth();
            const seasonSelect = document.getElementById("seasonSelect");
            if (seasonSelect) {
                if (currentMonth >= 5 && currentMonth <= 9) {
                    seasonSelect.value = 'Kharif';
                } else if (currentMonth >= 10 || currentMonth <= 2) {
                    seasonSelect.value = 'Rabi';
                } else {
                    seasonSelect.value = 'Zaid';
                }
            }

            // Open-Meteo Geolocation Weather Auto-fill
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(async(position) => {
                    try {
                        const lat = position.coords.latitude;
                        const lon = position.coords.longitude;
                        const response = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m`);
                        const meta = await response.json();

                        if (meta.current) {
                            if (document.getElementById("temperatureInput")) document.getElementById("temperatureInput").value = meta.current.temperature_2m.toFixed(1);
                            if (document.getElementById("humidityInput")) document.getElementById("humidityInput").value = meta.current.relative_humidity_2m.toFixed(1);
                        }
                    } catch (err) {
                        console.warn("Weather pre-fetch skipped.");
                    }
                });
            }

            // Form Submission Handling with Dynamic Progress Animations
            const form = document.getElementById("cropPredictionForm");
            const loader = document.getElementById("loadingWrapper");
            const barFill = document.getElementById("progressBarFill");
            const resultsBox = document.getElementById("resultsContainer");
            const resultsGrid = document.getElementById("resultsGrid");

            if (form) {
                form.addEventListener("submit", function(event) {
                    // CRITICAL: This line stops the page from reloading and appending variables to the URL!
                    event.preventDefault();

                    if (resultsBox) resultsBox.style.display = "none";
                    if (loader) loader.style.display = "block";
                    if (barFill) barFill.style.width = "0%";

                    // Extract structural data payloads
                    const formData = new FormData(form);
                    const payload = {};
                    formData.forEach((val, key) => payload[key] = isNaN(val) ? val : parseFloat(val));

                    // Progress animation simulation
                    let progress = 0;
                    const interval = setInterval(() => {
                        progress += 5;
                        if (barFill) barFill.style.width = `${progress}%`;
                        if (progress >= 100) clearInterval(interval);
                    }, 40);

                    // Send absolute URL targeting to avoid iframe context relative routing errors
                    fetch(window.location.origin + '/api/crop/recommend', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify(payload)
                        })
                        .then(res => res.json())
                        .then(data => {
                            clearInterval(interval);
                            setTimeout(() => {
                                if (loader) loader.style.display = "none";
                                if (!resultsGrid) return;
                                resultsGrid.innerHTML = "";

                                if (data.error) {
                                    alert("Error from model: " + data.error);
                                    return;
                                }

                                data.forEach(item => {
                                    const card = document.createElement("div");
                                    card.className = "crop-card";
                                    const seasonClass = (payload.season || 'kharif').toLowerCase();

                                    card.innerHTML = `
                                    <div class="crop-title-row">
                                        <span class="crop-name">${item.crop}</span>
                                        <span class="season-badge badge-${seasonClass}">${payload.season || 'Kharif'}</span>
                                    </div>
                                    <div class="confidence-label">
                                        <span>Match Accuracy Profile</span>
                                        <strong>${item.confidence.toFixed(1)}%</strong>
                                    </div>
                                    <div class="confidence-bar">
                                        <div class="confidence-fill" style="width: ${item.confidence}%"></div>
                                    </div>
                                    <div class="crop-tips">
                                        <strong>Cultivation Note:</strong> ${item.tips}
                                    </div>
                                `;
                                    resultsGrid.appendChild(card);
                                });

                                if (resultsBox) resultsBox.style.display = "block";
                            }, 500);
                        })
                        .catch(err => {
                            clearInterval(interval);
                            if (loader) loader.style.display = "none";
                            console.error("Fetch operational error:", err);
                            alert("Model execution failed to complete.");
                        });
                });
            }
        });
    </script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>

</html>
